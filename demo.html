<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOBLE — דמו הזנת נתונים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#0e1117;color:#e8eaf0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.card{background:#161b26;border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:28px 24px;width:100%;max-width:380px;}
.logo{font-size:28px;font-weight:900;color:#60a5fa;text-align:center;margin-bottom:4px;}
.subtitle{font-size:12px;color:#555e75;text-align:center;margin-bottom:28px;}
.field{margin-bottom:16px;}
.label{font-size:12px;color:#8b93a8;margin-bottom:6px;font-weight:600;}
input,textarea{width:100%;background:#1e2536;border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#e8eaf0;font-family:'Heebo',sans-serif;font-size:15px;padding:12px 14px;outline:none;transition:border-color .15s;}
input:focus,textarea:focus{border-color:#3b82f6;}
textarea{resize:none;height:80px;}
.btn{width:100%;background:#3b82f6;color:white;border:none;border-radius:12px;padding:14px;font-family:'Heebo',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;transition:background .15s;}
.btn:hover{background:#2563eb;}
.btn:disabled{background:#374151;cursor:not-allowed;}
.status{text-align:center;margin-top:16px;font-size:14px;font-weight:600;min-height:24px;}
.status.ok{color:#22c55e;}
.status.err{color:#ef4444;}
.status.loading{color:#f59e0b;}
.records{margin-top:24px;border-top:1px solid rgba(255,255,255,0.07);padding-top:20px;}
.records-title{font-size:13px;color:#8b93a8;margin-bottom:12px;font-weight:600;}
.record{background:#1e2536;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.record-name{font-size:14px;font-weight:700;}
.record-phone{font-size:12px;color:#8b93a8;margin-top:2px;}
.record-note{font-size:12px;color:#60a5fa;margin-top:4px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">NOBLE</div>
  <div class="subtitle">דמו — הזנת נתונים ל-Google Sheets</div>

  <div class="field">
    <div class="label">שם</div>
    <input type="text" id="f-name" placeholder="הכנס שם...">
  </div>

  <div class="field">
    <div class="label">טלפון</div>
    <input type="tel" id="f-phone" placeholder="הכנס טלפון...">
  </div>

  <div class="field">
    <div class="label">הערה</div>
    <textarea id="f-note" placeholder="הכנס הערה..."></textarea>
  </div>

  <button class="btn" id="submit-btn" onclick="submitForm()">שלח לגיליון ←</button>
  <div class="status" id="status"></div>

  <div class="records">
    <div class="records-title">רשומות אחרונות מהגיליון</div>
    <div id="records-list">טוען...</div>
  </div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbygCMtWP3s_o6KBUlhJqy3FVl1eG26bIR0Ns06RW6nBFs1hWB5bL5MA-Xas0BOEkDU_GA/exec";
var SHEET_ID = "1hL4pw1Ub24F5Ckl_ZQPfxr2u_zOstiVkeJHxF-anuwA";

function submitForm(){
  var name = document.getElementById("f-name").value.trim();
  var phone = document.getElementById("f-phone").value.trim();
  var note = document.getElementById("f-note").value.trim();

  if(!name){
    setStatus("חובה להכניס שם","err");
    return;
  }

  var btn = document.getElementById("submit-btn");
  btn.disabled = true;
  setStatus("שולח...","loading");

  var xhr = new XMLHttpRequest();
  xhr.open("POST", SCRIPT_URL, true);
  xhr.setRequestHeader("Content-Type","text/plain");
  xhr.onload = function(){
    btn.disabled = false;
    try{
      var res = JSON.parse(xhr.responseText);
      if(res.status==="ok"){
        setStatus("✓ נשמר בהצלחה בגיליון!","ok");
        document.getElementById("f-name").value="";
        document.getElementById("f-phone").value="";
        document.getElementById("f-note").value="";
        setTimeout(loadRecords, 1500);
      } else {
        setStatus("שגיאה — נסה שוב","err");
      }
    } catch(e){
      setStatus("✓ נשמר בהצלחה!","ok");
      document.getElementById("f-name").value="";
      document.getElementById("f-phone").value="";
      document.getElementById("f-note").value="";
      setTimeout(loadRecords, 1500);
    }
  };
  xhr.onerror = function(){
    btn.disabled = false;
    setStatus("שגיאת רשת — נסה שוב","err");
  };
  xhr.send(JSON.stringify({שם:name, טלפון:phone, הערה:note}));
}

function setStatus(msg,cls){
  var el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status "+cls;
}

function loadRecords(){
  var url = "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:json&sheet="+encodeURIComponent("גיליון1");
  var xhr = new XMLHttpRequest();
  xhr.open("GET", url, true);
  xhr.onload = function(){
    try{
      var text = xhr.responseText;
      var json = JSON.parse(text.replace(/^[^(]+\(|\);?$/g,""));
      var cols = json.table.cols.map(function(c){return c.label;});
      var rows = json.table.rows.map(function(r){
        var obj={};
        cols.forEach(function(c,i){obj[c]=r.c&&r.c[i]?r.c[i].v:"";});
        return obj;
      }).filter(function(r){return r["שם"];});

      var el = document.getElementById("records-list");
      if(!rows.length){
        el.innerHTML='<div style="color:#555e75;font-size:13px;">אין רשומות עדיין</div>';
        return;
      }
      el.innerHTML = rows.slice(-5).reverse().map(function(r){
        return '<div class="record">'+
          '<div class="record-name">'+r["שם"]+'</div>'+
          '<div class="record-phone">'+r["טלפון"]+'</div>'+
          (r["הערה"]?'<div class="record-note">'+r["הערה"]+'</div>':'')+
          '</div>';
      }).join("");
    } catch(e){
      document.getElementById("records-list").innerHTML='<div style="color:#555e75;font-size:13px;">לא ניתן לטעון רשומות</div>';
    }
  };
  xhr.send();
}

// טען רשומות בכניסה
loadRecords();
</script>
</body>
</html>
